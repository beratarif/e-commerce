<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-light border-bottom">
      <div class="container">
        <a class="navbar-brand fw-bold" href="../index.html">Mağazam</a>
        <button
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="../index.html">Anasayfa</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="../Product/product.html">Ürünler</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="../Sepet/basket.html">Sepet</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="../LoginRegister/index.html">Giriş</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container my-5">
      <div class="row">
        <div class="col-md-6">
          <img src="../img/headphone.jpeg" class="img-fluid rounded" />
        </div>
        <div class="col-md-6">
          <h1>Kulaklık</h1>
          <p>Yüksek Ses Kalitesi sunar.</p>
          <h4>300₺</h4>
          <button class="btn btn-success" id="addToCart">Sepete Ekle</button>
        </div>
      </div>

      <section id="products" class="container my-5">
      <h2 class="mb-4 fw-bold text-center">Yeni Ürünler</h2>
      <div class="row" id="productList"></div>
    </section>

    </div>
    <script src="../js/app.js"></script>
    <script>
    const products = [
        {
          id: 1,
          name: "Kablosuz Kulaklık",
          price: 399,
          img: "../img/headphone.jpeg",
          category: "Elektronik",
        },
        {
          id: 2,
          name: "Akıllı Saat",
          price: 899,
          img: "../img/watch.jpeg",
          category: "Elektronik",
        },
        {
          id: 3,
          name: "T-shirt",
          price: 149,
          img: "../img/tshirt.jpeg",
          category: "Giyim",
        },
        {
          id: 4,
          name: "Güneş Gözlüğü",
          price: 249,
          img: "../img/sunglasses.webp",
          category: "Aksesuar",
        },
        {
          id: 5,
          name: "Kupa Bardak",
          price: 79,
          img: "../img/mug.jpeg",
          category: "Ev & Yaşam",
        },
        {
          id: 6,
          name: "Yastık",
          price: 199,
          img: "../img/pillow.jpeg",
          category: "Ev & Yaşam",
        },
      ];

      const productList = document.getElementById("productList");
      const categoryButtons = document.querySelectorAll(".category-btn");

      function renderProducts(filterCategory = null) {
        productList.innerHTML = "";

        const filtered = filterCategory
          ? products.filter((p) => p.category === filterCategory)
          : products;

        if (filtered.length === 0) {
          productList.innerHTML = `<p class="text-center text-muted py-5">Bu kategoride ürün bulunamadı.</p>`;
          return;
        }

        filtered.forEach((p) => {
          const card = `
      <div class="col-md-3 mb-4">
        <div class="card shadow-sm h-100">
          <img src="${p.img}" class="card-img-top" alt="${p.name}">
          <div class="card-body d-flex flex-column">
            <h5 class="card-title">${p.name}</h5>
            <p class="card-text text-muted mb-4">${p.price} ₺</p>
            <button class="btn btn-primary mt-auto add-cart" data-id="${p.id}">Sepete Ekle</button>
          </div>
        </div>
      </div>`;
          productList.innerHTML += card;
        });
      }

      renderProducts(); // Başta tüm ürünler gözüksün

      // Kategori tıklama
      categoryButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          const selected = btn.textContent.trim();
          document
            .querySelectorAll(".category-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          renderProducts(selected);
        });
      });

      // Sepete ekleme
      document.addEventListener("click", (e) => {
        if (e.target.classList.contains("add-cart")) {
          const id = e.target.dataset.id;
          let cart = JSON.parse(localStorage.getItem("cart") || "[]");
          const found = cart.find((i) => i.id == id);
          if (found) found.qty++;
          else cart.push({ id, qty: 1 });
          localStorage.setItem("cart", JSON.stringify(cart));
        }
      });
    </script>
  </body>
</html>
